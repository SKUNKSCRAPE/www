name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p ./_site
          cp index.html ./_site/
          cp CNAME ./_site/
          touch ./_site/.nojekyll
          [ -f favicon.ico ] && cp favicon.ico ./_site/ || true
          [ -d assets ] && cp -r assets ./_site/assets || true
          [ -d public ] && cp -r public ./_site/public || true
          [ -f skunkscrape_landing_card.html ] && cp skunkscrape_landing_card.html ./_site/ || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
