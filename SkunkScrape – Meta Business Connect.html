<div class="card">

    <button onclick="loginWithFacebook()">Login with Facebook</button>

    <div id="profile" class="profile"></div>

<script src="./SkunkScrape – Meta Business Connect_files/saved_resource" async="" crossorigin="anonymous"></script><script id="facebook-jssdk" src="./SkunkScrape – Meta Business Connect_files/sdk.js.download"></script><script>
  window.fbAsyncInit = function() {
    FB.init({
      appId      : '1036933855280612',
      cookie     : true,
      xfbml      : true,
      version    : 'v24.0'
    });

    FB.AppEvents.logPageView();
  };

  (function(d, s, id){
     var js, fjs = d.getElementsByTagName(s)[0];
     if (d.getElementById(id)) {return;}
     js = d.createElement(s);
     js.id = id;
     js.src = "https://connect.facebook.net/en_US/sdk.js";
     fjs.parentNode.insertBefore(js, fjs);
   }(document, 'script', 'facebook-jssdk'));

  function loginWithFacebook() {
    FB.login(function(response) {
      if (response.authResponse) {
        fetchUserProfile();
      } else {
        alert("Login cancelled.");
      }
    }, {
      scope: 'public_profile'
    });
  }

  function fetchUserProfile() {
    FB.api('/me', { fields: 'id,name,picture' }, function(response) {
      const profileDiv = document.getElementById('profile');
      profileDiv.innerHTML = `
        <h3>Connected User</h3>
        <p><strong>Name:</strong> ${response.name}</p>
        <p><strong>ID:</strong> ${response.id}</p>
        <img src="${response.picture.data.url}" width="100" />
      `;
    });
  }
</script>
